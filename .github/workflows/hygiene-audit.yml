name: Kiro — HubSpot Hygiene Audit

on:
  schedule:
    # Monday 9:00 AM ET (14:00 UTC) — full weekly audit
    - cron: "0 14 * * 1"
    # Friday 9:00 AM ET (14:00 UTC) — lighter check-in reminder
    - cron: "0 14 * * 5"
    # Weekdays 8:00 AM ET (13:00 UTC) — daily SLA breach check
    - cron: "0 13 * * 1-5"

  workflow_dispatch:
    inputs:
      audit_mode:
        description: "Audit mode"
        required: false
        default: "weekly"
        type: choice
        options:
          - weekly
          - reminder
          - sla
      force_sla:
        description: "Force SLA alerts — bypasses 48h new-breach window (1=on, use for testing only)"
        required: false
        default: "0"
        type: choice
        options:
          - "0"
          - "1"

jobs:
  # ── Monday: full weekly audit ──────────────────────────────────────────────
  weekly-audit:
    name: Weekly hygiene audit (Monday)
    if: github.event_name == 'schedule' && github.event.schedule == '0 14 * * 1'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run weekly audit
        working-directory: scripts/hygiene_audit
        env:
          AUDIT_ENV:         dev        # change to 'production' to go live
          AUDIT_MODE:        weekly
          HUBSPOT_TOKEN:     ${{ secrets.HUBSPOT_TOKEN }}
          SLACK_BOT_TOKEN:   ${{ secrets.SLACK_BOT_TOKEN }}
          FIREFLIES_API_KEY: ${{ secrets.FIREFLIES_API_KEY }}
          RESEND_API_KEY:    ${{ secrets.RESEND_API_KEY }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
        run: python audit.py

  # ── Friday: lighter check-in reminder ─────────────────────────────────────
  friday-reminder:
    name: Friday check-in reminder
    if: github.event_name == 'schedule' && github.event.schedule == '0 14 * * 5'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Friday reminder
        working-directory: scripts/hygiene_audit
        env:
          AUDIT_ENV:         dev
          AUDIT_MODE:        reminder
          HUBSPOT_TOKEN:     ${{ secrets.HUBSPOT_TOKEN }}
          SLACK_BOT_TOKEN:   ${{ secrets.SLACK_BOT_TOKEN }}
          FIREFLIES_API_KEY: ${{ secrets.FIREFLIES_API_KEY }}
          RESEND_API_KEY:    ${{ secrets.RESEND_API_KEY }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
        run: python audit.py

  # ── Daily SLA check (weekdays 8 AM ET) ────────────────────────────────────
  daily-sla-check:
    name: Daily SLA breach check
    if: github.event_name == 'schedule' && github.event.schedule == '0 13 * * 1-5'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run daily SLA check
        working-directory: scripts/hygiene_audit
        env:
          AUDIT_ENV:         dev
          AUDIT_MODE:        sla
          AUDIT_SLA_FORCE:   "0"     # never force in scheduled run
          HUBSPOT_TOKEN:     ${{ secrets.HUBSPOT_TOKEN }}
          SLACK_BOT_TOKEN:   ${{ secrets.SLACK_BOT_TOKEN }}
          RESEND_API_KEY:    ${{ secrets.RESEND_API_KEY }}
        run: python sla_audit.py

  # ── Manual trigger ─────────────────────────────────────────────────────────
  manual-run:
    name: Manual run
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run audit
        working-directory: scripts/hygiene_audit
        env:
          AUDIT_ENV:         dev
          AUDIT_MODE:        ${{ github.event.inputs.audit_mode || 'weekly' }}
          AUDIT_SLA_FORCE:   ${{ github.event.inputs.force_sla || '0' }}
          HUBSPOT_TOKEN:     ${{ secrets.HUBSPOT_TOKEN }}
          SLACK_BOT_TOKEN:   ${{ secrets.SLACK_BOT_TOKEN }}
          FIREFLIES_API_KEY: ${{ secrets.FIREFLIES_API_KEY }}
          RESEND_API_KEY:    ${{ secrets.RESEND_API_KEY }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ "$AUDIT_MODE" = "sla" ]; then
            python sla_audit.py
          else
            python audit.py
          fi
