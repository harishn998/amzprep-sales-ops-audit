name: HubSpot Hygiene Audit

on:
  schedule:
    # Every Monday at 9:00 AM ET (14:00 UTC)
    - cron: "0 14 * * 1"

  # Allow manual trigger from GitHub Actions UI for testing
  workflow_dispatch:

jobs:
  run-audit:
    name: Run weekly hygiene audit
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run hygiene audit
        working-directory: scripts/hygiene_audit
        env:
          AUDIT_ENV:         dev            # ← change to 'production' to go live
          HUBSPOT_TOKEN:      ${{ secrets.HUBSPOT_TOKEN }}
          SLACK_BOT_TOKEN:    ${{ secrets.SLACK_BOT_TOKEN }}
          FIREFLIES_API_KEY:  ${{ secrets.FIREFLIES_API_KEY }}
          SENDGRID_API_KEY:   ${{ secrets.SENDGRID_API_KEY }}
        run: python audit.py
